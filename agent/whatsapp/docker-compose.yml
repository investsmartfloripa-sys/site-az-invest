# Gateway WhatsApp do "Café com Mercado" — Evolution API v2 + Postgres + Redis + Caddy (HTTPS).
# Roda no VPS 24/7 (não no PC). Setup completo: README-SETUP.md nesta pasta.
#
# Antes do primeiro `docker compose up -d`:
#   cp env.example .env   # e preencha EVOLUTION_APIKEY, POSTGRES_PASSWORD e DOMAIN

services:
  api:
    # Dica: depois que estiver funcionando, troque "latest" pela tag exata
    # (docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' evolution_api)
    # para os updates serem intencionais.
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=https://${DOMAIN}
      - AUTHENTICATION_API_KEY=${EVOLUTION_APIKEY}
      - LANGUAGE=pt-BR
      - DEL_INSTANCE=false
      - QRCODE_LIMIT=30
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
    expose:
      - "8080"

  postgres:
    image: postgres:16-alpine
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:2-alpine
    container_name: evolution_caddy
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  evolution_instances:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
