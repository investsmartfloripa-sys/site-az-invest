name: Inflação pipeline (IPCA + IGP-M)

on:
  # 12:20 UTC = 9:20 BRT — logo APÓS a divulgação do IBGE (~9h BRT no dia de
  # release); 15:00 UTC = segunda chance no mesmo dia (throttle do cron do GH
  # pode atrasar a primeira janela; SIDRA/Olinda às vezes propagam com lag).
  schedule:
    - cron: "20 12 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: inflacao-pipeline
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      # continue-on-error em cada build: falha do IPCA (ex. SIDRA fora do ar)
      # não pode derrubar o IGP-M em cascata (mesmo padrão do visao-geral-pipeline).
      - name: Build IPCA JSON e upload pro Blob
        run: python data-pipeline/python/build_ipca.py --upload
        continue-on-error: true

      - name: Build IGP-M JSON e upload pro Blob
        run: python data-pipeline/python/build_igpm.py --upload
        continue-on-error: true

  # Fotografa os gráficos do catálogo do Publisher (rota /render/<id>) e
  # arquiva PNGs numerados no Blob em releases/<indicador>/<mes_ref>/.
  # Roda DEPOIS dos builds: o release novo já está no Blob e a página de
  # render é force-dynamic (sem cache velho). Falha de um gráfico não
  # derruba os demais (ragged-edge; ver manifest.json de cada divulgação).
  render-charts:
    needs: build-and-upload
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Playwright (chromium)
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Renderizar e arquivar PNGs (IPCA + IGP-M)
        run: node data-pipeline/render/render_charts.mjs --indicador all
