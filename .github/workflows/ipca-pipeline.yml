name: Inflação pipeline (IPCA + IGP-M)

on:
  # 9h BRT (UTC-3) = 12h UTC
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: inflacao-pipeline
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      - name: Build IPCA JSON e upload pro Blob
        run: python data-pipeline/python/build_ipca.py --upload

      - name: Build IGP-M JSON e upload pro Blob
        run: python data-pipeline/python/build_igpm.py --upload
