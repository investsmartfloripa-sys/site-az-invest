name: Familias pipeline (BCB SGS + IBGE PNAD + Ipeadata)

# Painel "Famílias" — Ondas 1+2 (Blocos A Renda, B Endividamento, C Poder de Compra, D Estrutura Social).
# BCB SGS atualiza com defasagem ~2 meses; PNAD Contínua trimestral ~45 dias; Ipeadata 30-60 dias.
# Cron diário 23:30 UTC cobre todas as fontes sem custo extra.

on:
  schedule:
    - cron: "30 23 * * *"  # 23h30 UTC = 20h30 BRT
  workflow_dispatch:

concurrency:
  group: familias-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      # Steps ISOLADOS (continue-on-error): o SIDRA do IBGE bloqueia IPs de
      # nuvem intermitentemente (jun-jul/2026: ConnectTimeout por 3+ dias) e
      # derrubava o job inteiro — as fontes BCB/Ipeadata (B e C) não podem
      # parar por causa disso. O step final falha o workflow se algo quebrou,
      # p/ o Saúde dos dados continuar acusando.
      - name: Build Familias — Endividamento (B)
        id: endividamento
        run: python data-pipeline/python/build_familias_endividamento.py --upload
        continue-on-error: true
      - name: Build Familias — Renda (A)
        id: renda
        run: python data-pipeline/python/build_familias_renda.py --upload
        continue-on-error: true
      - name: Build Familias — Poder de Compra (C)
        id: poder_compra
        run: python data-pipeline/python/build_familias_poder_compra.py --upload
        continue-on-error: true
      - name: Build Familias — Estrutura Social (D)
        id: estrutura_social
        run: python data-pipeline/python/build_familias_estrutura_social.py --upload
        continue-on-error: true
      - name: Falhar se algum build quebrou
        if: steps.endividamento.outcome == 'failure' || steps.renda.outcome == 'failure' || steps.poder_compra.outcome == 'failure' || steps.estrutura_social.outcome == 'failure'
        run: |
          echo "Builds com falha: endividamento=${{ steps.endividamento.outcome }} renda=${{ steps.renda.outcome }} poder_compra=${{ steps.poder_compra.outcome }} estrutura_social=${{ steps.estrutura_social.outcome }}"
          exit 1
