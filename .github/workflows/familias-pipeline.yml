name: Familias pipeline (BCB SGS + IBGE PNAD + Ipeadata)

# Painel "Famílias" — Ondas 1+2 (Blocos A Renda, B Endividamento, C Poder de Compra, D Estrutura Social).
# BCB SGS atualiza com defasagem ~2 meses; PNAD Contínua trimestral ~45 dias; Ipeadata 30-60 dias.
# Cron diário 23:30 UTC cobre todas as fontes sem custo extra.

on:
  schedule:
    - cron: "30 23 * * *"  # 23h30 UTC = 20h30 BRT
  workflow_dispatch:

concurrency:
  group: familias-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: Build Familias — Endividamento (B)
        run: python data-pipeline/python/build_familias_endividamento.py --upload
      - name: Build Familias — Renda (A)
        run: python data-pipeline/python/build_familias_renda.py --upload
      - name: Build Familias — Poder de Compra (C)
        run: python data-pipeline/python/build_familias_poder_compra.py --upload
      - name: Build Familias — Estrutura Social (D)
        run: python data-pipeline/python/build_familias_estrutura_social.py --upload
