name: FII pipeline live (IFIX hero + Screener)

# Roda a cada 15 minutos durante o horário de pregão da B3 (10h-19h BRT = 13h-22h UTC)
# em dias úteis. Estes pipelines são leves:
#   - build_fii_ifix: ~30s (XFIX11 + CDI + IBOV + IMAB11)
#   - build_fii_screener: ~2-3 min (107 tickers × yfinance preço + volume + dividends 12m)
#
# Fora do pregão (noites, fins de semana) os preços yfinance não mudam, então não roda.
# IMPORTANTE: yfinance pode bater rate limit se rodar com muita freq — 15 min é ok
# pra ~107 tickers (testado no projeto-irmão market-data.yml que faz o mesmo).
on:
  schedule:
    # A cada 15 min entre 13:00 e 21:45 UTC (10:00-18:45 BRT) em dias úteis.
    # Inclui pre-mercado (9:45 BRT) e fechamento (~18:00 BRT) com folga.
    - cron: "*/15 13-22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: fii-pipeline-live
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      # 1. IFIX (hero + chart com benchmarks) — leve, ~30 segundos
      - name: build_fii_ifix (hero IFIX + benchmarks)
        run: python data-pipeline/python/build_fii_ifix.py --upload
        continue-on-error: true

      # 2. Screener (107 FIIs com PL, P/VP, DY, segmento) — médio, ~3 min
      - name: build_fii_screener (tabela 107 FIIs)
        run: python data-pipeline/python/build_fii_screener.py --upload
        continue-on-error: true
