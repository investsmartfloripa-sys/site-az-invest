name: Acoes pipeline (Renda Variável — Ibovespa)

# Roda 1x por dia útil após o fechamento do pregão, depois do market-data.yml
# (que gera market_history_full.json e market_fundamentals.json no Blob, lidos aqui).
#   45 22 UTC = 19:45 BRT (15 min após o market-data.yml)
#   45 00 UTC do dia seguinte = 21:45 BRT (retry se a 1ª execução falhou)
on:
  schedule:
    - cron: "45 22 * * 1-5"
    - cron: "45 0 * * 2-6"
  workflow_dispatch:
    inputs:
      run_valuation:
        description: "Rodar build_acoes_valuation (pesado: ~5min, ~85 tickers x yfinance)"
        required: false
        default: "1"

concurrency:
  group: acoes-pipeline
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      # Hero do Ibovespa + benchmarks (lê market_history_full do Blob + CDI SGS) — leve
      - name: build_acoes_ibov (hero + benchmarks)
        run: python data-pipeline/python/build_acoes_ibov.py --upload
        continue-on-error: true

      # Screener (universo IBOV + métricas; Blob first, yfinance nas lacunas) — ~2 min
      - name: build_acoes_screener (universo IBOV)
        run: python data-pipeline/python/build_acoes_screener.py --upload
        continue-on-error: true

      # Valuation (P/L bottom-up + prêmio EY/DY vs NTN-B) — pesado, ~5 min, append-only
      # ATENÇÃO: em runs de `schedule` o github.event.inputs não existe e o if
      # antigo (inputs.run_valuation != '0') avaliava FALSE — o step era PULADO
      # silenciosamente em todo cron (valuation ficou parado 01-04/06/26).
      - name: build_acoes_valuation (P/L bandas + prêmio)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_valuation != '0' }}
        run: python data-pipeline/python/build_acoes_valuation.py --upload --sleep 0.2
        continue-on-error: true

      - name: Upload artefatos (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acoes-pipeline-${{ github.run_id }}
          path: |
            data-pipeline/out/acoes_ibov.json
            data-pipeline/out/acoes_screener.json
            data-pipeline/out/acoes_valuation.json
          if-no-files-found: warn
          retention-days: 7
