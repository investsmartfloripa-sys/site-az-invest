name: FII pipeline pesado (Detail + Macro charts)

# Roda 1x por dia útil após o fechamento do pregão. Estes pipelines são pesados:
#   - build_fii_detail: ~5 min (107 tickers × yfinance .dividends + history)
#   - build_fii_macro_charts: ~10 min (CVM 7 anos + Tesouro Direto CSV 14 MB)
# Por isso ficam separados do pipeline leve que roda a cada 15 min.
#   22:35 UTC = 19:35 BRT (5 min depois do market-data.yml pra escalonar yfinance)
#   00:35 UTC do dia seguinte = 21:35 BRT (retry se primeira execução falhou)
on:
  schedule:
    - cron: "35 22 * * 1-5"
    - cron: "35 0 * * 2-6"
  workflow_dispatch:
    inputs:
      run_detail:
        description: "Rodar build_fii_detail (pesado: ~5min, 107 tickers x yfinance)"
        required: false
        default: "1"
      run_macro:
        description: "Rodar build_fii_macro_charts (pesado: ~10min, CVM 7 anos + TD CSV)"
        required: false
        default: "1"

concurrency:
  group: fii-pipeline-heavy
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      # Detail (página individual de cada FII com dividends, hero, indicadores) — pesado, ~5 min
      - name: build_fii_detail (107 páginas individuais)
        if: ${{ github.event.inputs.run_detail != '0' }}
        run: python data-pipeline/python/build_fii_detail.py --upload
        continue-on-error: true

      # Macro charts (P/VP histórico 5 anos + Prêmio NTN-B vs DY tijolo) — pesado, ~10 min
      - name: build_fii_macro_charts (P/VP + Prêmio histórico 5a)
        if: ${{ github.event.inputs.run_macro != '0' }}
        run: python data-pipeline/python/build_fii_macro_charts.py --upload
        continue-on-error: true

      - name: Upload artefatos (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fii-pipeline-heavy-${{ github.run_id }}
          path: |
            data-pipeline/out/fii_details.json
            data-pipeline/out/fii_macro_charts.json
          if-no-files-found: warn
          retention-days: 7
