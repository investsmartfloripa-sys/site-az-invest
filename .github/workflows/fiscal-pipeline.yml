name: Fiscal pipeline (Termômetro Fiscal)

on:
  # 9h BRT (UTC-3) = 12h UTC — após release das séries BCB SGS
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: fiscal-pipeline
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ secrets.NEXT_PUBLIC_BLOB_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      - name: Build Fiscal clássicos + upload Blob
        run: python data-pipeline/python/build_fiscal.py --upload

      - name: Build Termômetro Fiscal + upload Blob
        run: python data-pipeline/python/build_fiscal_termometro.py --upload
