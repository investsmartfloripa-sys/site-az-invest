name: Contas Externas pipeline (BCB BPM6 + Comex Stat)

# BCB SGS atualiza diariamente (reservas) e mensalmente (BP).
# SECEX Comex Stat atualiza mensalmente (defasagem ~1 mês).
# Cron diário cobre os dois — Comex tem rate limit interno, rodada inteira leva ~3min.

on:
  schedule:
    - cron: "30 23 * * *"  # 23h30 UTC = 20h30 BRT
  workflow_dispatch:

concurrency:
  group: contas-externas-pipeline
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: Build BCB JSON e upload
        run: python data-pipeline/python/build_contas_externas.py --upload
      - name: Build Comex Stat JSON e upload
        run: python data-pipeline/python/build_contas_externas_comex.py --upload
