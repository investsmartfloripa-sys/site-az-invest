name: Visao Geral pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

concurrency:
  group: visao-geral-pipeline
  cancel-in-progress: true

jobs:
  fontes-externas:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: OECD CLI Brasil
        run: python data-pipeline/python/build_visao_geral_oecd_cli.py --upload --soft-fail
      - name: BCB SGS Credito e Agregados
        run: python data-pipeline/python/build_visao_geral_credito.py --upload --soft-fail
      - name: ANP combustiveis
        run: python data-pipeline/python/build_visao_geral_anp.py --upload --soft-fail
      - name: ANFAVEA veiculos
        run: python data-pipeline/python/build_visao_geral_anfavea.py --upload --soft-fail
      - name: EPE energia
        run: python data-pipeline/python/build_visao_geral_epe.py --upload --soft-fail
      - name: CODACE cronologia
        run: python data-pipeline/python/build_visao_geral_codace.py --upload --soft-fail

  scrapers-confianca:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: FGV antecedentes
        run: python data-pipeline/python/build_visao_geral_fgv_antecedentes.py --upload --soft-fail
      - name: FGV confiancas
        run: python data-pipeline/python/build_visao_geral_fgv_confianca.py --upload --soft-fail
      - name: CNI
        run: python data-pipeline/python/build_visao_geral_cni.py --upload --soft-fail
      - name: PMI Brasil
        run: python data-pipeline/python/build_visao_geral_pmi.py --upload --soft-fail
      - name: Fecomercio SP
        run: python data-pipeline/python/build_visao_geral_fecomercio.py --upload --soft-fail

  scrapers-hard-data:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: Hard data
        run: python data-pipeline/python/build_visao_geral_hard_data.py --upload --soft-fail

  derivados:
    runs-on: ubuntu-latest
    needs: [fontes-externas, scrapers-confianca, scrapers-hard-data]
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
          pip install numpy
      - name: Hiato HP + Hamilton
        run: python data-pipeline/python/build_visao_geral_hiato.py --upload --soft-fail
      - name: ICF proprio
        run: python data-pipeline/python/build_visao_geral_icf.py --upload --soft-fail

  modelos-recessao:
    runs-on: ubuntu-latest
    needs: derivados
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
          pip install statsmodels numpy
      - name: 5 modelos de recessao
        run: python data-pipeline/python/build_visao_geral_recessao.py --upload --soft-fail
