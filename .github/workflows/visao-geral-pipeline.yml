name: Visão Geral pipeline (termômetro do ciclo BR)

# Cron diário 22:00 UTC = 19:00 BRT — depois do fechamento dos mercados.
# Dependências entre jobs:
#  fontes-externas (paralelo: OECD CLI, BCB SGS crédito, ANP, ANFAVEA, EPE, CODACE)
#    → derivados (hiato HP+Hamilton, ICF próprio) — precisam IBC-Br + ICF inputs no Blob
#      → modelos-recessao — lê todos os JSONs anteriores no Blob
#
# Cada job usa --soft-fail para que falha pontual não derrube o painel.
# Padrão "ragged-edge tolerante" — JSON tem freshness_status por bloco.

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: visao-geral-pipeline
  cancel-in-progress: true

jobs:
  fontes-externas:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: OECD CLI Brasil
        run: python data-pipeline/python/build_visao_geral_oecd_cli.py --upload --soft-fail
      - name: BCB SGS Crédito e Agregados
        run: python data-pipeline/python/build_visao_geral_credito.py --upload --soft-fail
      - name: ANP combustíveis
        run: python data-pipeline/python/build_visao_geral_anp.py --upload --soft-fail
      - name: ANFAVEA veículos
        run: python data-pipeline/python/build_visao_geral_anfavea.py --upload --soft-fail
      - name: EPE energia
        run: python data-pipeline/python/build_visao_geral_epe.py --upload --soft-fail
      - name: CODACE cronologia
        run: python data-pipeline/python/build_visao_geral_codace.py --upload --soft-fail

  scrapers-confianca:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt
      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt
      - name: FGV antecedentes (IACE/ICCE/IAEmp/IIE-Br)
        run: python data-pipeline/python/build_visao_geral_fgv_antecedentes.py --upload --soft-fail
      - name: FGV confianças (ICE/ICI/ICOM/ICS/ICST/ICA/ICC)
        run: python data-pipeline/python/build_visao_geral_fgv_confianca.py --upload --soft-fail
      - name: CNI (ICEI + INEC)
        run: python data-pipeline/python/build_visao_geral_cni.py --upload --soft-fail
      - name: S&P Global PMI Brasil
        run: python data-pipeline/python/build_visao_geral_pmi.py --upload --soft-fail
      - name: Fecomercio SP (ICEC + ICF)
        run: python data-pipeline/python/build_visao_geral_fecomercio.py --upload --soft-fail

  scrapers-hard-data:
    runs-on: ubuntu-latest
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      NEXT_PUBLIC_BLOB_BASE_URL: ${{ vars.NEXT_PUBLIC_BLOB_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
