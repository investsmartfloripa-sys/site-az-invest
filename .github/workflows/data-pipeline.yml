name: Data pipeline (Painel Panorama)

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: data-pipeline-panorama
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      DATA_PIPELINE_OUT: ${{ github.workspace }}/data-pipeline/out
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      - name: Python panorama JSON
        run: python data-pipeline/python/run_panorama_builds.py

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: R packages
        run: Rscript data-pipeline/r/install_packages.R

      - name: R yield curves SVG
        run: Rscript data-pipeline/r/build_yield_curves_svg.R

      - name: R Treasury EUA SVG
        run: Rscript data-pipeline/r/build_treasury_us_svg.R
        continue-on-error: true

      - name: R Selic implicita SVG
        run: Rscript data-pipeline/r/build_selic_implicita.R
        continue-on-error: true

      - name: Upload SVGs to Blob
        run: python data-pipeline/python/upload_static_charts.py
