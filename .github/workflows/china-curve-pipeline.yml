name: China curve pipeline (CGB ChinaBond)

# Curva soberana da China (CGB YTM) via ChinaBond/CCDC — 1 data por request,
# fonte frágil → cron diário + merge append-only no Blob; a página NUNCA
# consulta o ChinaBond ao vivo.
#   09:30 UTC = 17:30 China (após o fechamento) · retry 12:30 UTC
on:
  schedule:
    - cron: "30 9 * * 1-5"
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Dias corridos p/ trás no seed histórico (ex.: 1900 ≈ 5 anos)"
        required: false
        default: "0"

concurrency:
  group: china-curve-pipeline
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      # Em runs de `schedule` os inputs não existem (padrão: incremental 10d).
      - name: build_china_curve
        run: |
          FLAGS="--days 10"
          if [ "${{ github.event.inputs.backfill_days }}" != "" ] && [ "${{ github.event.inputs.backfill_days }}" != "0" ]; then
            FLAGS="--backfill-days ${{ github.event.inputs.backfill_days }}"
          fi
          python data-pipeline/python/build_china_curve.py $FLAGS --upload

      - name: Upload artefato (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: china-curve-${{ github.run_id }}
          path: data-pipeline/out/china_curve.json
          if-no-files-found: warn
          retention-days: 7
