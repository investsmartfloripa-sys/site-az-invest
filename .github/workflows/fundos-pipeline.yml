name: Fundos pipeline (Fundos de Investimento — Mais Retorno)

# Ranking de fundos por categoria via Mais Retorno Data API.
# Cadência alvo: A CADA 2 DIAS — 0 11 UTC = 08:00 BRT (dados D-1).
#   ⚠️ COTA (free = 500 req/mês): 41 fundos × 1 req/fundo × ~15 rodadas/mês
#   ≈ 615 req/mês, que ESTOURA o free. ANTES de ligar a automação (criar o
#   secret MAISRETORNO_API_KEY), escolher uma destas:
#     (a) batch via compare_assets em pares (~2 fundos/chamada → ~315/mês, cabe);
#     (b) reduzir p/ ~2x/semana (cron "0 11 * * 2,5");
#     (c) assinar o Basic (1.500/mês).
on:
  schedule:
    - cron: "0 11 */2 * *"
  workflow_dispatch:
    inputs:
      with_drawdown:
        description: "Buscar drawdown (1 chamada extra por fundo; cuidado com a cota)"
        required: false
        default: "0"
      with_quotes:
        description: "Gerar fundos_quotes.json (série de cota p/ gráficos; ~46 req extras — pesado na cota)"
        required: false
        default: "0"

concurrency:
  group: fundos-pipeline
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      MAISRETORNO_API_KEY: ${{ secrets.MAISRETORNO_API_KEY }}
      MAISRETORNO_PLAN: ${{ vars.MAISRETORNO_PLAN || 'free' }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-pipeline/python/requirements.txt

      - name: Pip install
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/python/requirements.txt

      - name: build_fundos_ranking (Mais Retorno)
        run: |
          python data-pipeline/python/build_fundos_ranking.py --upload \
            ${{ github.event.inputs.with_drawdown == '1' && '--with-drawdown' || '' }}
        continue-on-error: true

      # Cotas p/ os gráficos da página de detalhe — PESADO (~46 req). Só no
      # disparo manual com with_quotes=1 (a série muda devagar; não precisa
      # rodar a cada 2 dias). No free, rodar com parcimônia.
      - name: build_fundos_quotes (séries p/ gráficos)
        if: ${{ github.event.inputs.with_quotes == '1' }}
        run: python data-pipeline/python/build_fundos_quotes.py --upload
        continue-on-error: true

      - name: Upload artefatos (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fundos-pipeline-${{ github.run_id }}
          path: |
            data-pipeline/out/fundos_ranking.json
            data-pipeline/out/fundos_quotes.json
          if-no-files-found: warn
          retention-days: 7
